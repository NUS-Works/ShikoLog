<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIKOLOG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>SHIKOLOG</h1>
        <p>Track Your Progress</p>
    </header>

    <section class="hero-card">
        <div class="hero-top">
            <span>🏆 PROFILE</span>
            <span>LEVEL 1</span>
        </div>

        <h2>WELCOME</h2>

        <div class="hero-stats">
            <div>
                <small>TOTAL SESSIONS</small>
                <h3>0</h3>
            </div>

            <div>
                <small>STREAK</small>
                <h3>0 DAYS</h3>
            </div>
        </div>
    </section>

    <section class="stats-grid">

        <div class="card">
            <div class="icon">🏆</div>
            <p>連続記録</p>
            <h3>0 Days</h3>
        </div>

        <div class="card">
            <div class="icon">⭐</div>
            <p>総記録数</p>
            <h3>0</h3>
        </div>

        <div class="card wide">
            <div class="icon">📈</div>
            <p>平均満足度</p>
            <h3>-</h3>
        </div>

    </section>

    <section class="calendar-card">
        <h2>THIS MONTH</h2>

        <div class="grass">
            <div></div><div></div><div class="filled"></div><div></div><div></div>
            <div class="filled"></div><div></div>

            <div></div><div class="filled"></div><div></div><div></div><div></div>
            <div class="filled"></div><div></div>

            <div class="filled"></div><div></div><div></div><div class="filled"></div><div></div>
            <div></div><div></div>
        </div>
    </section>

    <section class="plan-card">
        <h2>TODAY'S PLAN</h2>
        <p>まだ予定はありません</p>
    </section>

    <section class="achievement-card">
        <h2>ACHIEVEMENTS</h2>

        <div class="achievement">🔒 FIRST SESSION</div>
        <div class="achievement">🔒 7 DAY STREAK</div>
        <div class="achievement">🔒 30 DAY STREAK</div>
        <div class="achievement">🔒 100 SESSIONS</div>
    </section>

    <button class="main-button">
        START SESSION
    </button>

</div>

</body>
</html>
