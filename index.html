<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIKOLOG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>SHIKOLOG</h1>
        <p>Track Your Progress</p>
    </header>

    <div class="hero-stats">

        <div>
            <small>TOTAL SESSIONS</small>
            <h3>0</h3>
        </div>

        <div>
            <small>STREAK</small>
            <h3>0 DAYS</h3>
        </div>

    </div>

    <section class="stats-grid">

        <div class="card">
            <div class="icon">🏆</div>
            <p>連続記録</p>
            <h3 id="streakCount">0 DAYS</h3>
        </div>

        <div class="card">
            <div class="icon">⭐</div>
            <p>総記録数</p>
            <h3 id="totalSessions">0</h3>
        </div>

        <div class="card wide">
            <div class="icon">📈</div>
            <p>平均満足度</p>
            <h3>-</h3>
        </div>

    </section>

    <section class="calendar-card">
        <h2>THIS MONTH</h2>

        <div class="grass">
            <div></div><div></div><div class="filled"></div><div></div><div></div>
            <div class="filled"></div><div></div>

            <div></div><div class="filled"></div><div></div><div></div><div></div>
            <div class="filled"></div><div></div>

            <div class="filled"></div><div></div><div></div><div class="filled"></div><div></div>
            <div></div><div></div>
        </div>
    </section>

    <section class="plan-card">
        <h2>TODAY'S PLAN</h2>
        <p>まだ予定はありません</p>
    </section>

    <section class="achievement-card">

        <h2>ACHIEVEMENTS</h2>

        <div id="achievement1" class="achievement">
            🔒 FIRST SESSION
        </div>

        <div id="achievement7" class="achievement">
            🔒 7 SESSIONS
        </div>

        <div id="achievement100" class="achievement">
            🔒 100 SESSIONS
        </div>

    </section>

    <section class="history-card">

        <h2>SESSION HISTORY</h2>

        <div id="historyList">
            <p>まだ記録がありません</p>
        </div>

    </section>

    <button class="main-button">
        START SESSION
    </button>

</div>

<div id="sessionModal" class="modal hidden">

    <div class="modal-content">

        <div class="modal-header">
            <h2>SESSION RECORD</h2>
            <button id="closeModal">✕</button>
        </div>

        <label>CATEGORY</label>
        <input id="categoryInput" type="text" placeholder="例: 催眠">

        <label>SATISFACTION</label>

        <select id="satisfactionInput">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option selected>5</option>
        </select>

        <label>DURATION (MIN)</label>
        <input id="durationInput" type="number" placeholder="30">

        <label>NOTE</label>
        <textarea id="noteInput" rows="4"></textarea>

        <button id="saveButton" class="save-button">
            SAVE SESSION
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
