<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIKOLOG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>SHIKOLOG</h1>
            <p class="subtitle">Track Your Sessions</p>
        </header>

        <section class="stats">
            <div class="card">
                <h2>🏆</h2>
                <p>連続記録</p>
                <span>0 Days</span>
            </div>

            <div class="card">
                <h2>⭐</h2>
                <p>総記録数</p>
                <span>0</span>
            </div>

            <div class="card">
                <h2>📈</h2>
                <p>平均満足度</p>
                <span>-</span>
            </div>
        </section>

        <section class="today">
            <h2>TODAY'S PLAN</h2>
            <p>まだ予定はありません</p>
        </section>

        <button class="main-button">
            + NEW SESSION
        </button>

    </div>

</body>
</html>
